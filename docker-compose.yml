# docker-compose.yml
# Complete Docker Compose configuration for AllocAid TA Management System
# Includes automatic dummy data loading for development

services:
  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: allocaid-db
    environment:
      POSTGRES_DB: allocaid_db
      POSTGRES_USER: allocaid_user
      POSTGRES_PASSWORD: allocaid_pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allocaid_user -d allocaid_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - allocaid-network
    restart: unless-stopped

  # Main Application (Backend + Frontend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: allocaid-app
    # ADDED: Entrypoint script for automatic dummy data loading
    entrypoint: ["/scripts/docker-startup-init.sh"]
    # UPDATED: Command that gets called by entrypoint
    command: ["deno", "run", "--allow-all", "--watch", "server.ts"]
    environment:
      # Database Configuration
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: allocaid_db
      DB_USER: allocaid_user
      DB_PASSWORD: allocaid_pass
      # Gmail SMTP Configuration
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 465 # 587
      SMTP_USERNAME: allocaid.emailer@gmail.com
      SMTP_PASSWORD: vqxrnohlnpiodsow
      SMTP_FROM: allocaid.emailer@gmail.com
      SMTP_SECURE: true

      # Application Configuration
      PORT: 8000
      DENO_ENV: development
      ENVIRONMENT: development

      # JWT Secrets - change these in production
      JWT_SECRET: ${JWT_SECRET:-your-secure-jwt-secret-change-me}
      REFRESH_SECRET: ${REFRESH_SECRET:-your-secure-refresh-secret-change-me}

      # Frontend URL
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - allocaid-network
    volumes:
      - ./app:/app # allow writes
      - ./uploads:/uploads
      - ./scripts:/scripts:ro # ADDED: Mount scripts directory for dummy data loading
    restart: unless-stopped
    profiles:
      - development
      - production

  # Development Frontend - for development only
  frontend-dev:
    image: node:18-alpine
    container_name: allocaid-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./app/src/frontend:/app
      - /app/node_modules
    networks:
      - allocaid-network
    profiles:
      - development
    depends_on:
      - app

  # pgAdmin - for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: allocaid-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@allocaid.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - allocaid-network
    profiles:
      - development
    depends_on:
      - database

  # Redis - for session storage/caching
  redis:
    image: redis:7-alpine
    container_name: allocaid-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - allocaid-network
    profiles:
      - production
      - caching
    command: redis-server --appendonly yes
    restart: unless-stopped

  # Test Database - for running tests
  test-database:
    image: postgres:15-alpine
    container_name: allocaid-test-db
    environment:
      POSTGRES_DB: test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - allocaid-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - test

networks:
  allocaid-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  postgres_test_data:
    driver: local
